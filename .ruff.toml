# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.per-file-ignores]
# Tests follow a looser style, mirroring home-assistant/core conventions.
"tests/**" = [
    "S101",    # asserts are the whole point of a test
    "PLR2004", # magic values in assertions are clearer inline
    "ANN",     # type annotations are not required in tests
    "ARG",     # fixtures/fakes routinely take unused arguments
    "D",       # docstring rules are relaxed for tests
    "TC",      # runtime imports are fine in tests
    "PYI034",  # fakes may narrow async context-manager return types
    "E501",    # long, descriptive assertions are acceptable
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
