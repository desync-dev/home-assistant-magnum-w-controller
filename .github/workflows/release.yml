name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          year_month="$(date -u +%Y.%-m)"
          # Find the highest patch number already released this month.
          latest="$(git tag --list "${year_month}.*" \
            | awk -F. '{print $3}' \
            | sort -n \
            | tail -n1)"
          if [ -z "${latest}" ]; then
            patch=0
          else
            patch=$((latest + 1))
          fi
          version="${year_month}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${version}"

      - name: Update manifest version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          manifest="custom_components/magnum_w_controller/manifest.json"
          tmp="$(mktemp)"
          jq --arg version "${VERSION}" '.version = $version' "${manifest}" > "${tmp}"
          mv "${tmp}" "${manifest}"

      - name: Commit manifest update
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/magnum_w_controller/manifest.json
          git commit -m "chore: release ${VERSION}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --target "$(git rev-parse HEAD)" \
            --title "${VERSION}" \
            --generate-notes
